spring:
  application:
    name: citylens-backend-spring
  
  datasource:
    url: jdbc:postgresql://localhost:5432/citylens_db
    username: citylens
    password: citylens_password
    driver-class-name: org.postgresql.Driver
    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    mongodb:
      uri: mongodb://localhost:27017/citylens_app
    redis:
      host: localhost
      port: 6379

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

server:
  port: 8080
  servlet:
    context-path: /

app:
  jwt:
    secret: your-super-secret-key-change-in-production-spring-boot-256bit-min
    expiration: 604800000

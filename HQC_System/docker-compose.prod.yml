version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: hqc-system-postgres-prod
    environment:
      POSTGRES_USER: hqcsystem
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: hqc_system_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:7.0
    container_name: hqc-system-mongodb-prod
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7.2-alpine
    container_name: hqc-system-redis-prod
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: hqc-system-backend-prod
    environment:
      - DATABASE_URL=postgresql://hqcsystem:${POSTGRES_PASSWORD}@postgres:5432/hqc_system_db
      - MONGODB_URL=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - mongodb
      - redis

  web:
    build: ./web-dashboard
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  mongodb_data:
